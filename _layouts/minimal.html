<!DOCTYPE html>
<html lang="zh-CN">

{% include head.html %}

<style>
  .minimal-landing {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #f6f7f9;
    color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }

  .minimal-main {
    flex: 1;
    width: 100%;
    max-width: 40rem;
    margin: 0 auto;
    padding: 3.5rem 1.5rem 2rem;
    box-sizing: border-box;
  }

  .minimal-title {
    font-size: 1.75rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 0.35rem;
  }

  .minimal-lead {
    margin: 0 0 2rem;
    font-size: 0.95rem;
    line-height: 1.55;
    color: #5c5c5c;
  }

  .project-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .project-item {
    margin: 0 0 0.75rem;
  }

  .project-link {
    display: block;
    padding: 1rem 1.1rem;
    background: #fff;
    border: 1px solid #e8e9ec;
    border-radius: 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .project-link:hover,
  .project-link:focus {
    border-color: #c5c8d0;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    outline: none;
  }

  .project-name {
    font-weight: 600;
    font-size: 1rem;
    margin: 0 0 0.25rem;
  }

  .project-desc {
    margin: 0;
    font-size: 0.875rem;
    color: #6b6b6b;
    line-height: 1.45;
  }

  .project-url {
    margin: 0.4rem 0 0;
    font-size: 0.8rem;
    color: #2563eb;
    word-break: break-all;
  }

  .minimal-foot {
    text-align: center;
    padding: 1.25rem 1rem 2rem;
    font-size: 0.8rem;
    color: #8a8a8a;
  }

  .minimal-foot a {
    color: #6b7280;
    text-decoration: none;
  }

  .minimal-foot a:hover {
    text-decoration: underline;
  }
</style>

<body class="minimal-landing" ontouchstart="">
  <main class="minimal-main">
    {{ content }}
  </main>
  <footer class="minimal-foot">
    <p>© {{ site.time | date: '%Y' }} {{ site.title }}</p>
  </footer>
</body>

</html>
