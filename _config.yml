# Site settings
title: aimer Blog
SEOTitle: aimer的博客 | aimer Blog
header-img: img/home-bg.jpg
email: 1289539891@qq.com
description: "这里是 aimer 的个人博客，与你一起发现更大的世界"
keyword: "aimer"
url: "" # your host, for absolute URL
baseurl: "" # for example, '/blog' if your blog hosted on 'host/blog'

# Publish posts or collection documents with a future date.
future: true

# 极简首页：隐藏顶部搜索图标（首页已不使用 default 布局）
hide_search: true

# SNS settings（留空则不显示对应图标；旧模板占位已清空）
RSS: false
weibo_username:
zhihu_username:
github_username: Laimerfin
twitter_username:
#facebook_username:  huxpro
#linkedin_username:  firstname-lastname-idxxxx

# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
highlighter: rouge
permalink: pretty
paginate: 10
exclude:
  [
    "less",
    "node_modules",
    "Gruntfile.js",
    "package.json",
    "README.md",
    "README.zh.md",
  ]
anchorjs: true # if you want to customize anchor. check out line:181 of `post.html`
# If you have timezone issue (e.g. #68) in China, uncomment to use this:
#timezone: CN

# Gems
# from PR#40, to support local preview for Jekyll 3.0
# make sure you have this gem installed
# `$ gem install jekyll-paginate`
plugins: [jekyll-paginate]

# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
kramdown:
  input: GFM # use Github Flavored Markdown !important
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Disqus settings（不用评论请留空）
disqus_username:

# Netease settings
netease_comment: false

# Analytics settings
# Baidu Analytics
# ba_track_id: [your track id]

# Google Analytics（不需要统计时请保持为空）
ga_track_id:
ga_domain:

# Sidebar settings
sidebar: false
sidebar-about-description: ""
sidebar-avatar: https://github.com/Laimerfin.png

# Featured Tags
featured-tags: false
featured-condition-size: 1 # A tag will be featured if the size of it is more than this condition value

# Progressive Web Apps
chrome-tab-theme-color: "#f6f7f9"
service-worker: false

# MathJax rendering for layout:page (e.g. post preview)
page-mathjax: false

# 首页「项目」列表（在 index 展示）；按需增删
projects:
  - name: 个人博客（本仓库）
    desc: GitHub Pages 源码与部署
    url: https://github.com/Laimerfin/Laimerfin.github.io
  - name: GitHub 主页
    desc: 更多仓库与代码
    url: https://github.com/Laimerfin

# Friends（侧边栏友情链接；已关闭 sidebar 时通常不展示）
friends: []
